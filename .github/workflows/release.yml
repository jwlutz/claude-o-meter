name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only — don't create a Release"
        type: boolean
        default: true

jobs:
  build-macos:
    runs-on: macos-latest  # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Ad-hoc codesign with stable identifier
        run: |
          codesign --force --sign - \
            --identifier "ClaudeMeter" \
            --timestamp=none \
            .build/release/claude-o-meter
          codesign --verify --verbose=2 .build/release/claude-o-meter
          codesign -d -r- .build/release/claude-o-meter 2>&1 | grep designated || true

      - name: Package distribution tarball
        run: |
          STAGE="claude-o-meter"
          mkdir -p "$STAGE"
          cp .build/release/claude-o-meter "$STAGE/"
          cp scripts/installer.sh "$STAGE/install.sh"
          cp scripts/uninstall.sh   "$STAGE/uninstall.sh"
          cp README.md              "$STAGE/README.md"
          chmod +x "$STAGE/claude-o-meter" "$STAGE/install.sh" "$STAGE/uninstall.sh"
          tar czf "claude-o-meter-macos-arm64.tar.gz" "$STAGE"
          shasum -a 256 "claude-o-meter-macos-arm64.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: claude-o-meter-macos-arm64.tar.gz
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows/src-tauri

      - name: Install tauri-cli
        run: cargo install --locked tauri-cli@^2

      - name: Tauri build
        working-directory: windows/src-tauri
        run: cargo tauri build

      - name: Stage Windows artifacts
        shell: bash
        working-directory: windows/src-tauri/target/release
        run: |
          mkdir -p ../../../../win-out
          cp claude-o-meter.exe          ../../../../win-out/ 2>/dev/null || true
          cp bundle/msi/*.msi             ../../../../win-out/ 2>/dev/null || true
          cp bundle/nsis/*-setup.exe      ../../../../win-out/ 2>/dev/null || true
          ls -la ../../../../win-out

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: win-out/*
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && (inputs.dry_run != true)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f -ls

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos/*.tar.gz
            artifacts/windows/*
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: true
